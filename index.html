<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Cuauhtémoc Cataño - Web, Java and Python Developer Portfolio"
    />
    <title>Cuauhtémoc Cataño | Developer Portfolio</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
    />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <a href="/" class="logo">Cuauhtémoc Cataño</a>

        <nav class="navbar">
          <a href="#home" class="active">Home</a>
          <a href="#about">About</a>
          <a href="#skills">Skills</a>
          <a href="#projects">Projects</a>
          <a href="#contact">Contact</a>
        </nav>

        <button class="toggle-icon" aria-label="Toggle theme">
          <i class="bx bx-moon"></i>
        </button>
      </header>

      <main>
        <section id="home" class="home">
          <div class="home-content">
            <h1>Web & Software Developer</h1>
            <p>Crafting digital experiences with code and creativity</p>
            <div class="social-media">
              <a
                href="https://github.com/cuauhtemoccatano"
                aria-label="GitHub Profile"
              >
                <i class="bx bxl-github"></i>
              </a>
              <a
                href="https://www.linkedin.com/in/cuauhtemoccatano/"
                aria-label="LinkedIn Profile"
              >
                <i class="bx bxl-linkedin"></i>
              </a>
            </div>
            <a href="Assets/CV Cuauhtémoc Cataño.pdf" class="btn" download
              >Download CV</a
            >
          </div>
          <div class="home-img">
            <img src="Assets/headshot-color.png" alt="Cuauhtémoc Cataño" />
          </div>
        </section>
      </main>
    </div>
    <script src="script.js"></script>
